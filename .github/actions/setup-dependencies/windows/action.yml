name: Setup Windows Dependencies

inputs:
  build-type:
    description: Type for the build
    required: true
    default: Debug
  msystem:
    description: MSYS2 subsystem to use
    required: false
  vcvars-arch:
    description: Visual Studio architecture to use
    required: true
    default: amd64
  source-dir:
    description: Absolute path to the cloned source tree
    required: false
    default: ""

runs:
  using: composite

  steps:
    # NOTE: Installed on MinGW as well for SignTool
    - name: Enter VS Developer shell
      if: ${{ runner.os == 'Windows' }}
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ inputs.vcvars-arch }}
        vsversion: 2022

    - name: Setup Java (MSVC)
      uses: actions/setup-java@v5
      with:
        distribution: zulu
        java-version: 21

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13' 
        # Always use host architecture (x64) for Python, even when cross-compiling to ARM64
        # Python needs to run on the build host, not the target platform
        architecture: ${{ (inputs.vcvars-arch == 'x86' || inputs.vcvars-arch == 'amd64_x86') && 'x86' || 'x64' }}

    - name: Configure NuGet sources (MSVC)
      if: ${{ inputs.msystem == '' }}
      shell: powershell
      run: |
        $sourceDir = "${{ inputs.source-dir }}"
        if ([string]::IsNullOrWhiteSpace($sourceDir)) {
          $sourceDir = $env:GITHUB_WORKSPACE
        }
        $nugetConfig = Join-Path $sourceDir "nuget.config"
        if (-not (Test-Path $nugetConfig)) {
          throw "nuget.config not found at $nugetConfig"
        }

        # Inject GitHub Packages credentials for the tomlplusplus feed.
        nuget sources Remove -Name "project-tick" -ConfigFile $nugetConfig -NonInteractive | Out-Null
        nuget sources Add `
          -Name "project-tick" `
          -Source "https://nuget.pkg.github.com/Project-Tick/index.json" `
          -UserName "${{ github.actor }}" `
          -Password "${{ github.token }}" `
          -StorePasswordInClearText `
          -ConfigFile $nugetConfig `
          -NonInteractive | Out-Null

    - name: Pre-install binary dependencies (NuGet Manifest)
      if: ${{ inputs.msystem == '' }}
      shell: powershell
      run: |
        $sourceDir = "${{ inputs.source-dir }}"
        if ([string]::IsNullOrWhiteSpace($sourceDir)) {
          $sourceDir = $env:GITHUB_WORKSPACE
        }
        $packagesConfig = Join-Path $sourceDir "packages.config"
        # Using NuGet manifest - Dependabot will track ./packages.config
        nuget install $packagesConfig -OutputDirectory (Join-Path $sourceDir "dependencies") -ConfigFile (Join-Path $sourceDir "nuget.config")

        
    - name: Setup MSYS2 (MinGW)
      if: ${{ inputs.msystem != '' }}
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ inputs.msystem }}
        update: true
        install: >-
          git
        pacboy: >-
          toolchain:p
          ccache:p
          cmake:p
          extra-cmake-modules:p
          ninja:p
          cmark:p
          tomlplusplus:p
          zlib:p
          qrencode:p
          binutils:p
          qt6-base:p
          qt6-svg:p
          qt6-imageformats:p
          qt6-networkauth:p
          qt6-positioning:p
          qt6-serialport:p
          qt6-5compat:p

    - name: Install NSIS (MSVC)
      if: ${{ runner.os == 'Windows' && inputs.msystem == '' }}
      shell: powershell
      run: choco install nsis -y

    - name: Install NSIS (MinGW)
      if: ${{ runner.os == 'Windows' && inputs.msystem != '' }}
      shell: msys2 {0}
      run: pacman -S --needed --noconfirm mingw-w64-x86_64-nsis

    - name: Add NSIS to PATH
      if: ${{ runner.os == 'Windows'}}
      shell: powershell
      run: |
        $nsisPath = "C:\Program Files (x86)\NSIS"
        echo "NSIS_PATH=$nsisPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "$nsisPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: List pacman packages (MinGW)
      if: ${{ inputs.msystem != '' }}
      shell: msys2 {0}
      run: |
        pacman -Qe
