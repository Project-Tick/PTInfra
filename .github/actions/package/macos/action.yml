name: Package for macOS
description: Create a macOS package for ProjT Launcher

inputs:
  version:
    description: Launcher version
    required: true
  build-type:
    description: Type for the build
    required: true
    default: Debug
  artifact-name:
    description: Name of the uploaded artifact
    required: true
    default: macOS
  apple-codesign-cert:
    description: Certificate for signing macOS builds
    required: false
  apple-codesign-password:
    description: Password for signing macOS builds
    required: false
  apple-codesign-id:
    description: Certificate ID for signing macOS builds
    required: false
  apple-notarize-apple-id:
    description: Apple ID used for notarizing macOS builds
    required: false
  apple-notarize-team-id:
    description: Team ID used for notarizing macOS builds
    required: false
  apple-notarize-password:
    description: Password used for notarizing macOS builds
    required: false
  sparkle-ed25519-key:
    description: Private key for signing Sparkle updates
    required: false
  source-dir:
    description: Absolute path to the cloned source tree
    required: false
    default: ""

runs:
  using: composite

  steps:
    - name: Fetch codesign certificate
      shell: bash
      run: |
        if [ -n '${{ inputs.apple-codesign-cert }}' ]; then
          echo '${{ inputs.apple-codesign-cert }}' | base64 --decode > codesign.p12
        fi
        if [ -n '${{ inputs.apple-codesign-id }}' ] && [ -s codesign.p12 ]; then
          security create-keychain -p '${{ inputs.apple-codesign-password }}' build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p '${{ inputs.apple-codesign-password }}' build.keychain
          security import codesign.p12 -k build.keychain -P '${{ inputs.apple-codesign-password }}' -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k '${{ inputs.apple-codesign-password }}' build.keychain
        else
          echo ":warning: Using ad-hoc code signing for macOS, as certificate was not present." >> $GITHUB_STEP_SUMMARY
        fi

    - name: Package
      shell: bash
      env:
        BUILD_DIR: ${{ format('{0}/build', inputs.source-dir || github.workspace) }}
        INSTALL_DIR: ${{ format('{0}/install', inputs.source-dir || github.workspace) }}
      run: |
        cmake --install ${{ env.BUILD_DIR }} --config ${{ inputs.build-type }}

        cd ${{ env.INSTALL_DIR }}
        chmod +x "ProjTLauncher.app/Contents/MacOS/projtlauncher"

        if [ -n '${{ inputs.apple-codesign-id }}' ]; then
          APPLE_CODESIGN_ID='${{ inputs.apple-codesign-id }}'
          ENTITLEMENTS_FILE='../program_info/App.entitlements'
        else
          APPLE_CODESIGN_ID='-'
          ENTITLEMENTS_FILE='../program_info/AdhocSignedApp.entitlements'
        fi

        sudo codesign --sign "$APPLE_CODESIGN_ID" --deep --force --entitlements "$ENTITLEMENTS_FILE" --options runtime "ProjTLauncher.app/Contents/MacOS/projtlauncher"
        mv "ProjTLauncher.app" "ProjT Launcher.app"
        if [ -d "ProjT Launcher Installer.app" ]; then
          sudo codesign --sign "$APPLE_CODESIGN_ID" --deep --force --entitlements "$ENTITLEMENTS_FILE" --options runtime "ProjT Launcher Installer.app"
        fi

    - name: Notarize
      shell: bash
      env:
        INSTALL_DIR: ${{ format('{0}/install', inputs.source-dir || github.workspace) }}
      run: |
        cd ${{ env.INSTALL_DIR }}

        if [ -n '${{ inputs.apple-notarize-password }}' ]; then
          ditto -c -k --sequesterRsrc --keepParent "ProjT Launcher.app" ../ProjTLauncher.zip
          xcrun notarytool submit ../ProjTLauncher.zip \
            --wait --progress \
            --apple-id '${{ inputs.apple-notarize-apple-id }}' \
            --team-id '${{ inputs.apple-notarize-team-id }}' \
            --password '${{ inputs.apple-notarize-password }}'

          xcrun stapler staple "ProjT Launcher.app"
        else
          echo ":warning: Skipping notarization as credentials are not present." >> $GITHUB_STEP_SUMMARY
        fi
        ditto -c -k --sequesterRsrc --keepParent "ProjT Launcher.app" ../ProjTLauncher.zip
    - name: Build DMG
      shell: bash
      env:
        INSTALL_DIR: ${{ format('{0}/install', inputs.source-dir || github.workspace) }}
        DMG_NAME: ProjTLauncher.dmg
        DMG_VOL_NAME: ProjT Launcher
        DMG_EULA: ${{ format('{0}/COPYING.md', inputs.source-dir || github.workspace) }}
        DMG_BG: ${{ format('{0}/program_info/dmg-background.png', inputs.source-dir || github.workspace) }}
      run: |
        if ! command -v create-dmg >/dev/null 2>&1; then
          brew install create-dmg
        fi

        cd ${{ env.INSTALL_DIR }}
        rm -rf ../dmg-staging ../${{ env.DMG_NAME }}
        mkdir -p ../dmg-staging
        cp -R "ProjT Launcher.app" ../dmg-staging/
        if [ -d "ProjT Launcher Installer.app" ]; then
          cp -R "ProjT Launcher Installer.app" ../dmg-staging/
        fi

        args=(
          --volname "${{ env.DMG_VOL_NAME }}"
          --window-size 640 420
          --icon-size 128
          --icon "ProjT Launcher.app" 160 210
          --icon "ProjT Launcher Installer.app" 160 90
          --app-drop-link 480 210
        )

        if [ -f "${{ env.DMG_BG }}" ]; then
          args+=(--background "${{ env.DMG_BG }}")
        fi

        if [ -f "${{ env.DMG_EULA }}" ]; then
          args+=(--eula "${{ env.DMG_EULA }}")
        fi

        create-dmg "${args[@]}" ../${{ env.DMG_NAME }} ../dmg-staging || \
          create-dmg --volname "${{ env.DMG_VOL_NAME }}" ../${{ env.DMG_NAME }} ../dmg-staging

    - name: Build PKG (Launcher)
      shell: bash
      env:
        INSTALL_DIR: ${{ format('{0}/install', inputs.source-dir || github.workspace) }}
        PKG_NAME: ProjTLauncher-macOS-${{ inputs.version }}.pkg
      run: |
        cd ${{ env.INSTALL_DIR }}
        if [ ! -d "ProjT Launcher.app" ]; then
          echo ":warning: ProjT Launcher.app not found; skipping PKG build." >> $GITHUB_STEP_SUMMARY
          exit 0
        fi

        rm -f ../${{ env.PKG_NAME }}
        pkgbuild --install-location /Applications \
          --component "ProjT Launcher.app" \
          ../bootstrap-component.pkg

        if [ -f "${{ format('{0}/COPYING.md', inputs.source-dir || github.workspace) }}" ]; then
          echo ":warning: productbuild does not support --license; building PKG without embedded license." >> $GITHUB_STEP_SUMMARY
        fi
        productbuild --package ../bootstrap-component.pkg \
          ../${{ env.PKG_NAME }}

    - name: Make Sparkle signature
      shell: bash
      run: |
        if [ '${{ inputs.sparkle-ed25519-key }}' != '' ]; then
          echo '${{ inputs.sparkle-ed25519-key }}' > ed25519-priv.pem
          openssl_bin="/opt/homebrew/opt/openssl@3/bin/openssl"
          if [ ! -x "$openssl_bin" ]; then
            openssl_bin="/usr/local/opt/openssl@3/bin/openssl"
          fi
          if [ ! -x "$openssl_bin" ]; then
            openssl_bin="openssl"
          fi
          signature=$("$openssl_bin" pkeyutl -sign -rawin -in ${{ format('{0}/ProjTLauncher.zip', inputs.source-dir || github.workspace) }} -inkey ed25519-priv.pem | openssl base64 | tr -d \\n)
          rm ed25519-priv.pem
          cat >> $GITHUB_STEP_SUMMARY << EOF
        ### Artifact Information :information_source:
        - :memo: Sparkle Signature (ed25519): \`$signature\`
        EOF
        else
          cat >> $GITHUB_STEP_SUMMARY << EOF
        ### Artifact Information :information_source:
        - :warning: Sparkle Signature (ed25519): No private key available (likely a pull request or fork)
        EOF
        fi

    - name: Upload binary tarball
      uses: actions/upload-artifact@v5
      with:
        name: ProjTLauncher-${{ inputs.artifact-name }}-${{ inputs.version }}-${{ inputs.build-type }}
        path: |
          ${{ format('{0}/ProjTLauncher.zip', inputs.source-dir || github.workspace) }}
          ${{ format('{0}/ProjTLauncher.dmg', inputs.source-dir || github.workspace) }}
          ${{ format('{0}/ProjTLauncher-macOS-{1}.pkg', inputs.source-dir || github.workspace, inputs.version) }}
